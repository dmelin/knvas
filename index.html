<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knvas - Interactive Grid</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-section">
            <h2 class="section-title">Knvases</h2>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">star</span>
                <span class="menu-text">Stars</span>
            </a>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">grid_on</span>
                <span class="menu-text">Grid</span>
            </a>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">visibility</span>
                <span class="menu-text">Eyes</span>
            </a>
        </div>
        <div class="sidebar-section">
            <h2 class="section-title">Info</h2>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">help_outline</span>
                <span class="menu-text">How to use</span>
            </a>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">info</span>
                <span class="menu-text">About</span>
            </a>
            <a href="#" class="menu-item">
                <span class="material-symbols-outlined">description</span>
                <span class="menu-text">License</span>
            </a>
        </div>
        <div class="sidebar-section">
            <a href="#" class="menu-item" data-action="clear">
                <span class="material-symbols-outlined">close</span>
                <span class="menu-text">Clear</span>
            </a>
        </div>
    </nav>

    <div class="container">
    </div>

    <div class="container-content">
        <img src="assets/images/logo.png" alt="Knvas Logo" class="logo">
    </div>

    <div class="toolbox" style="display: none;">
        <button class="tool-button" id="flip-button" title="Flip canvas">
            <span class="material-symbols-outlined">flip</span>
        </button>
        <button class="tool-button" id="three-d-button" title="Toggle 3D perspective">
            <span class="material-symbols-outlined">view_in_ar</span>
        </button>
        <div class="fps-display">
            <span id="fps-value">0</span> fps
        </div>
    </div>

    <div class="settings-panel" style="display: none;">
        <h3 class="settings-title">Settings</h3>
        <div class="settings-content"></div>
    </div>

    <div class="code-display" style="display: none;">
        <h3 class="code-title">
            Code
            <button class="copy-button" title="Copy code">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
        </h3>
        <pre class="code-content"><code></code></pre>
    </div>

    <script>
        const container = document.querySelector('.container');

        let bounds = {
            left: window.innerWidth * 0.25,
            top: window.innerHeight * 0.20,
            right: window.innerWidth * 0.75,
            bottom: window.innerHeight * 0.80
        };

        function updateLayout() {
            container.style.left = bounds.left + 'px';
            container.style.top = bounds.top + 'px';
            container.style.width = (bounds.right - bounds.left) + 'px';
            container.style.height = (bounds.bottom - bounds.top) + 'px';
        }

        window.addEventListener('resize', () => {
            const minSize = 150;
            bounds.left = Math.min(bounds.left, window.innerWidth - minSize * 2);
            bounds.top = Math.min(bounds.top, window.innerHeight - minSize * 2);
            bounds.right = Math.max(bounds.left + minSize, Math.min(bounds.right, window.innerWidth - minSize));
            bounds.bottom = Math.max(bounds.top + minSize, Math.min(bounds.bottom, window.innerHeight - minSize));

            updateLayout();
        });

        updateLayout();

        // Theme definitions
        const themes = {
            stars: {
                'Starfield': {
                    backgroundColor: '#0a0e27',
                    middlegroundColor: '#ffffff',
                    foregroundColor: '#00d4ff',
                    lineOpacity: '0.3',
                    starCount: '400',
                    mouseAttract: 'false',
                    glowAtMouse: 'true',
                    tailSpeed: '0'
                },
                'Fire': {
                    backgroundColor: '#1a0000',
                    middlegroundColor: '#ff4500',
                    foregroundColor: '#ffff00',
                    lineOpacity: '0.5',
                    starCount: '600',
                    mouseAttract: 'true',
                    glowAtMouse: 'true',
                    tailSpeed: '0.3'
                },
                'Aurora': {
                    backgroundColor: '#001a1a',
                    middlegroundColor: '#00ff88',
                    foregroundColor: '#88ffff',
                    lineOpacity: '0.4',
                    starCount: '300',
                    mouseAttract: 'true',
                    glowAtMouse: 'true',
                    tailSpeed: '0.5'
                },
                'Cyberpunk': {
                    backgroundColor: '#0d0221',
                    middlegroundColor: '#ff006e',
                    foregroundColor: '#00fff5',
                    lineOpacity: '0.6',
                    starCount: '500',
                    mouseAttract: 'true',
                    glowAtMouse: 'true',
                    tailSpeed: '0'
                }
            },
            grid: {
                'Blueprint': {
                    backgroundColor: '#0a2463',
                    middlegroundColor: '#3e92cc',
                    foregroundColor: '#ffffff',
                    lineOpacity: '0.8',
                    columnCount: '10',
                    rowCount: '12',
                    mouseAttract: 'false',
                    glowAtMouse: 'false',
                    tailSpeed: '0',
                    gravityFactor: '0.3'
                },
                'Neon Grid': {
                    backgroundColor: '#ff006e',
                    middlegroundColor: '#00fff5',
                    foregroundColor: '#ffffff',
                    lineOpacity: '1',
                    columnCount: '15',
                    rowCount: '18',
                    mouseAttract: 'true',
                    glowAtMouse: 'true',
                    tailSpeed: '0.4',
                    gravityFactor: '0.5'
                },
                'Organic': {
                    backgroundColor: '#2d5016',
                    middlegroundColor: '#90ee90',
                    foregroundColor: '#ffffff',
                    lineOpacity: '0.7',
                    columnCount: '12',
                    rowCount: '14',
                    mouseAttract: 'true',
                    glowAtMouse: 'true',
                    tailSpeed: '0.6',
                    gravityFactor: '0.7'
                },
                'Minimal': {
                    backgroundColor: '#f5f5f5',
                    middlegroundColor: '#333333',
                    foregroundColor: '#666666',
                    lineOpacity: '1',
                    columnCount: '10',
                    rowCount: '12',
                    mouseAttract: 'false',
                    glowAtMouse: 'false',
                    tailSpeed: '0',
                    gravityFactor: '0.3'
                }
            }
        };

        // Helper function to get active knvas element
        function getKnvasElement() {
            return document.querySelector('knvas');
        }

        // Settings panel management
        const settingsPanel = document.querySelector('.settings-panel');
        const settingsContent = document.querySelector('.settings-content');

        // Menu handlers
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();

                if (item.dataset.action === 'clear') {
                    // Clear all knvas elements from anywhere
                    document.querySelectorAll('knvas').forEach(el => el.remove());
                    settingsPanel.style.display = 'none';
                    codeDisplay.style.display = 'none';
                    document.querySelector('.toolbox').style.display = 'none';
                } else {
                    const type = item.querySelector('.menu-text').textContent.toLowerCase();

                    // Remove existing knvas elements from anywhere
                    document.querySelectorAll('knvas').forEach(el => el.remove());

                    // Add new knvas element to container
                    const knvasElement = document.createElement('knvas');
                    knvasElement.setAttribute('type', type);

                    // Add options based on type
                    if (type === 'stars') {
                        // Enable mouse attraction
                        const attract = document.createElement('option');
                        attract.setAttribute('name', 'mouseAttract');
                        attract.setAttribute('value', 'true');
                        knvasElement.appendChild(attract);

                        // Enable glow at mouse
                        const glow = document.createElement('option');
                        glow.setAttribute('name', 'glowAtMouse');
                        glow.setAttribute('value', 'true');
                        knvasElement.appendChild(glow);

                        // Set background color
                        const bg = document.createElement('option');
                        bg.setAttribute('name', 'backgroundColor');
                        bg.setAttribute('value', '#1a2332');
                        knvasElement.appendChild(bg);

                        // Set star color (middleground)
                        const mg = document.createElement('option');
                        mg.setAttribute('name', 'middlegroundColor');
                        mg.setAttribute('value', '#00d4ff');
                        knvasElement.appendChild(mg);

                        // Set glow color (foreground)
                        const fg = document.createElement('option');
                        fg.setAttribute('name', 'foregroundColor');
                        fg.setAttribute('value', '#d946ef');
                        knvasElement.appendChild(fg);

                        // Set line opacity
                        const opacity = document.createElement('option');
                        opacity.setAttribute('name', 'lineOpacity');
                        opacity.setAttribute('value', '0.3');
                        knvasElement.appendChild(opacity);

                        // Set star count
                        const count = document.createElement('option');
                        count.setAttribute('name', 'starCount');
                        count.setAttribute('value', '400');
                        knvasElement.appendChild(count);

                        // Set tail speed
                        const tail = document.createElement('option');
                        tail.setAttribute('name', 'tailSpeed');
                        tail.setAttribute('value', '0');
                        knvasElement.appendChild(tail);
                    } else if (type === 'grid') {
                        // Set background color
                        const bg = document.createElement('option');
                        bg.setAttribute('name', 'backgroundColor');
                        bg.setAttribute('value', '#1a2332');
                        knvasElement.appendChild(bg);

                        // Set line/dot color (middleground)
                        const mg = document.createElement('option');
                        mg.setAttribute('name', 'middlegroundColor');
                        mg.setAttribute('value', '#00d4ff');
                        knvasElement.appendChild(mg);

                        // Set glow color (foreground)
                        const fg = document.createElement('option');
                        fg.setAttribute('name', 'foregroundColor');
                        fg.setAttribute('value', '#d946ef');
                        knvasElement.appendChild(fg);

                        // Set line opacity
                        const opacity = document.createElement('option');
                        opacity.setAttribute('name', 'lineOpacity');
                        opacity.setAttribute('value', '1');
                        knvasElement.appendChild(opacity);

                        // Set column count
                        const cols = document.createElement('option');
                        cols.setAttribute('name', 'columnCount');
                        cols.setAttribute('value', '20');
                        knvasElement.appendChild(cols);

                        // Set row count
                        const rows = document.createElement('option');
                        rows.setAttribute('name', 'rowCount');
                        rows.setAttribute('value', '24');
                        knvasElement.appendChild(rows);

                        // Enable mouse attraction
                        const attract = document.createElement('option');
                        attract.setAttribute('name', 'mouseAttract');
                        attract.setAttribute('value', 'false');
                        knvasElement.appendChild(attract);

                        // Enable glow at mouse
                        const glow = document.createElement('option');
                        glow.setAttribute('name', 'glowAtMouse');
                        glow.setAttribute('value', 'false');
                        knvasElement.appendChild(glow);

                        // Set tail speed
                        const tail = document.createElement('option');
                        tail.setAttribute('name', 'tailSpeed');
                        tail.setAttribute('value', '0');
                        knvasElement.appendChild(tail);

                        // Set gravity factor
                        const gravity = document.createElement('option');
                        gravity.setAttribute('name', 'gravityFactor');
                        gravity.setAttribute('value', '0.3');
                        knvasElement.appendChild(gravity);
                    }

                    container.appendChild(knvasElement);
                    populateSettings(type);
                }
            });
        });

        // Component settings definitions
        const componentSettings = {
            stars: [
                { name: 'backgroundColor', type: 'color', label: 'Background' },
                { name: 'middlegroundColor', type: 'color', label: 'Star Color' },
                { name: 'foregroundColor', type: 'color', label: 'Glow Color' },
                { name: 'lineOpacity', type: 'range', label: 'Line Opacity', min: 0, max: 1, step: 0.05 },
                { name: 'starCount', type: 'number', label: 'Star Count' },
                { name: 'mouseAttract', type: 'checkbox', label: 'Mouse Attract' },
                { name: 'glowAtMouse', type: 'checkbox', label: 'Glow at Mouse' },
                { name: 'tailSpeed', type: 'range', label: 'Tail Speed', min: 0, max: 1, step: 0.05 }
            ],
            grid: [
                { name: 'backgroundColor', type: 'color', label: 'Background' },
                { name: 'middlegroundColor', type: 'color', label: 'Line Color' },
                { name: 'foregroundColor', type: 'color', label: 'Glow Color' },
                { name: 'lineOpacity', type: 'range', label: 'Line Opacity', min: 0, max: 1, step: 0.05 },
                { name: 'columnCount', type: 'number', label: 'Columns', min: 1, max: 20 },
                { name: 'rowCount', type: 'number', label: 'Rows', min: 1, max: 20 },
                { name: 'mouseAttract', type: 'checkbox', label: 'Mouse Attract' },
                { name: 'glowAtMouse', type: 'checkbox', label: 'Glow at Mouse' },
                { name: 'tailSpeed', type: 'range', label: 'Tail Speed', min: 0, max: 1, step: 0.05 },
                { name: 'gravityFactor', type: 'range', label: 'Gravity', min: 0, max: 1, step: 0.05 }
            ]
        };

        function populateSettings(type) {
            settingsContent.innerHTML = '';
            const settings = componentSettings[type];

            if (!settings) {
                settingsPanel.style.display = 'none';
                return;
            }

            const knvasElement = getKnvasElement();
            if (!knvasElement) return;

            // Add theme selector
            const themeOptions = themes[type];
            if (themeOptions) {
                const themeDiv = document.createElement('div');
                themeDiv.className = 'setting-item';

                const themeLabel = document.createElement('label');
                themeLabel.htmlFor = 'theme-selector';
                themeLabel.textContent = 'Theme';

                const themeSelect = document.createElement('select');
                themeSelect.id = 'theme-selector';

                // Add default option
                const defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = '-- Select Theme --';
                themeSelect.appendChild(defaultOption);

                // Add theme options
                Object.keys(themeOptions).forEach(themeName => {
                    const option = document.createElement('option');
                    option.value = themeName;
                    option.textContent = themeName;
                    themeSelect.appendChild(option);
                });

                themeSelect.addEventListener('change', () => {
                    const selectedTheme = themeSelect.value;
                    if (selectedTheme && themeOptions[selectedTheme]) {
                        const themeConfig = themeOptions[selectedTheme];
                        // Apply all theme settings
                        Object.keys(themeConfig).forEach(key => {
                            updateOption(key, themeConfig[key]);
                        });
                        // Repopulate settings to show updated values
                        populateSettings(type);
                    }
                });

                themeDiv.appendChild(themeLabel);
                themeDiv.appendChild(themeSelect);
                settingsContent.appendChild(themeDiv);

                // Add separator
                const separator = document.createElement('div');
                separator.style.borderTop = '1px solid #e0e0e0';
                separator.style.margin = '10px 0';
                settingsContent.appendChild(separator);
            }

            settings.forEach(setting => {
                const settingDiv = document.createElement('div');
                settingDiv.className = setting.type === 'checkbox' ? 'setting-item checkbox-item' : 'setting-item';

                if (setting.type === 'checkbox') {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = setting.name;

                    const optionEl = knvasElement.querySelector(`option[name="${setting.name}"]`);
                    checkbox.checked = optionEl ? (optionEl.getAttribute('value') === 'true') : false;

                    checkbox.addEventListener('change', () => {
                        updateOption(setting.name, checkbox.checked ? 'true' : 'false');
                    });

                    const label = document.createElement('label');
                    label.htmlFor = setting.name;
                    label.textContent = setting.label;

                    settingDiv.appendChild(checkbox);
                    settingDiv.appendChild(label);
                } else {
                    const label = document.createElement('label');
                    label.htmlFor = setting.name;
                    label.textContent = setting.label;

                    const input = document.createElement('input');
                    input.type = setting.type;
                    input.id = setting.name;

                    // Set range-specific attributes
                    if (setting.type === 'range') {
                        input.min = setting.min;
                        input.max = setting.max;
                        input.step = setting.step;
                    }

                    const optionEl = knvasElement.querySelector(`option[name="${setting.name}"]`);
                    input.value = optionEl ? optionEl.getAttribute('value') : (setting.type === 'range' ? setting.min : '');

                    input.addEventListener('change', () => {
                        updateOption(setting.name, input.value);
                    });

                    // For range inputs, also update on input event for live feedback
                    if (setting.type === 'range') {
                        input.addEventListener('input', () => {
                            updateOption(setting.name, input.value);
                        });
                    }

                    settingDiv.appendChild(label);
                    settingDiv.appendChild(input);
                }

                settingsContent.appendChild(settingDiv);
            });

            settingsPanel.style.display = 'block';
            updateSettingsPanelPosition();
            updateCodeDisplay();
            toolbox.style.display = 'flex';
            updateToolboxPosition();
        }

        function updateOption(name, value) {
            const knvasElement = getKnvasElement();
            if (!knvasElement) return;

            let optionEl = knvasElement.querySelector(`option[name="${name}"]`);

            if (!optionEl) {
                optionEl = document.createElement('option');
                optionEl.setAttribute('name', name);
                knvasElement.appendChild(optionEl);
            }

            optionEl.setAttribute('value', value);

            // Trigger knvas reinitialization - keep it in the same parent
            const parent = knvasElement.parentElement;
            knvasElement.remove();
            parent.appendChild(knvasElement);

            // Update code display
            updateCodeDisplay();
        }

        function updateSettingsPanelPosition() {
            if (settingsPanel.style.display === 'none') return;

            const panelWidth = 130;
            const gap = 10;

            // Use bounds instead of getBoundingClientRect to avoid 3D transform issues
            let left = bounds.right + gap;

            // Ensure panel stays within viewport
            const maxLeft = window.innerWidth - panelWidth - gap;
            left = Math.min(left, maxLeft);

            settingsPanel.style.left = left + 'px';
            settingsPanel.style.top = bounds.top + 'px';
            settingsPanel.style.height = (bounds.bottom - bounds.top) + 'px';
        }

        // Code display management
        const codeDisplay = document.querySelector('.code-display');
        const codeContent = document.querySelector('.code-content code');

        function generateCode() {
            const knvasElement = getKnvasElement();
            if (!knvasElement) return '';

            const type = knvasElement.getAttribute('type');
            const options = Array.from(knvasElement.querySelectorAll('option'));

            let code = `<knvas type="${type}">`;

            if (options.length > 0) {
                code += '\n';
                options.forEach(option => {
                    const name = option.getAttribute('name');
                    const value = option.getAttribute('value');
                    code += `  <option name="${name}" value="${value}">\n`;
                });
            }

            code += '</knvas>';
            return code;
        }

        function updateCodeDisplay() {
            const code = generateCode();
            if (code) {
                codeContent.textContent = code;
                codeDisplay.style.display = 'block';
                updateCodeDisplayPosition();
            } else {
                codeDisplay.style.display = 'none';
            }
        }

        function updateCodeDisplayPosition() {
            if (codeDisplay.style.display === 'none') return;

            const gap = 10;

            // Use bounds instead of getBoundingClientRect to avoid 3D transform issues
            codeDisplay.style.left = bounds.left + 'px';
            codeDisplay.style.top = (bounds.bottom + gap) + 'px';
            codeDisplay.style.width = (bounds.right - bounds.left) + 'px';
        }

        // Update both panels when container moves or window resizes
        const originalUpdateLayout = updateLayout;
        updateLayout = function() {
            originalUpdateLayout();
            updateSettingsPanelPosition();
            updateCodeDisplayPosition();
        };

        // Copy button functionality
        const copyButton = document.querySelector('.copy-button');
        const copyIcon = copyButton.querySelector('.material-symbols-outlined');
        copyButton.addEventListener('click', () => {
            const code = generateCode();
            if (!code) return;

            navigator.clipboard.writeText(code).then(() => {
                copyButton.classList.add('success');
                copyIcon.textContent = 'check';
                setTimeout(() => {
                    copyButton.classList.remove('success');
                    copyIcon.textContent = 'content_copy';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        });

        // Toolbox management
        const toolbox = document.querySelector('.toolbox');
        const flipButton = document.querySelector('#flip-button');
        const threeDButton = document.querySelector('#three-d-button');
        const fpsValue = document.querySelector('#fps-value');

        function updateToolboxPosition() {
            if (toolbox.style.display === 'none') return;

            const gap = 10;

            // Use bounds instead of getBoundingClientRect to avoid 3D transform issues
            toolbox.style.left = (bounds.right - toolbox.offsetWidth) + 'px';
            toolbox.style.top = (bounds.top - toolbox.offsetHeight - gap) + 'px';
        }

        // Flip button functionality
        flipButton.addEventListener('click', () => {
            const knvasElement = getKnvasElement();
            if (!knvasElement) return;

            // Toggle between container and body
            if (knvasElement.parentElement === container) {
                document.body.appendChild(knvasElement);
            } else {
                container.appendChild(knvasElement);
            }
        });

        // 3D button functionality
        threeDButton.addEventListener('click', () => {
            container.classList.toggle('is3D');
            threeDButton.classList.toggle('active');
        });

        // Update FPS display
        function updateFPSDisplay() {
            const knvasElement = getKnvasElement();
            if (knvasElement) {
                const instance = knvas.instances.get(knvasElement);
                if (instance && instance.fps !== undefined) {
                    fpsValue.textContent = instance.fps;
                }
            }
            requestAnimationFrame(updateFPSDisplay);
        }
        updateFPSDisplay();

        // Update toolbox position when container moves
        const originalUpdateLayoutToolbox = updateLayout;
        updateLayout = function() {
            originalUpdateLayoutToolbox();
            updateSettingsPanelPosition();
            updateCodeDisplayPosition();
            updateToolboxPosition();
        };

        window.addEventListener('resize', () => {
            updateSettingsPanelPosition();
            updateCodeDisplayPosition();
            updateToolboxPosition();
        });
    </script>

    <script src="components/knvas.js"></script>
    <script src="components/stars.js"></script>
    <script src="components/grid.js"></script>
</body>
</html>
