<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knvas - Interactive Grid</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css"> -->
</head>
<body>
    <button class="hamburger-menu" aria-label="Toggle menu">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <div class="mobile-header">
        <div class="mobile-branding">knvas</div>
        <div class="mobile-fps">
            <span id="mobile-fps-value">0</span> fps
        </div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-section" id="canvas-menu-section">
            <h2 class="section-title">Knvases</h2>
        </div>
        <div class="sidebar-section">
            <h2 class="section-title">Info</h2>
            <a href="#" class="menu-item" data-modal="how">
                <span class="material-symbols-outlined">help_outline</span>
                <span class="menu-text">How to use</span>
            </a>
            <a href="#" class="menu-item" data-modal="about">
                <span class="material-symbols-outlined">info</span>
                <span class="menu-text">About</span>
            </a>
            <a href="#" class="menu-item" data-modal="contact">
                <span class="material-symbols-outlined">mail</span>
                <span class="menu-text">Contact</span>
            </a>
        </div>
        <div class="sidebar-section">
            <a class="menu-item" href="https://buymeacoffee.com/melin" target="_blank">
                <span class="material-symbols-outlined">coffee</span>
                <span class="menu-text">Buy me a coffee</span>
            </a>
        </div>
    </nav>

    <div class="container">
    </div>

    <div class="container-content">
        <img src="assets/images/logo.png" alt="Knvas Logo" class="logo">
    </div>

    <div class="toolbox" style="display: none;">
        <button class="tool-button" id="flip-button" title="Flip canvas">
            <span class="material-symbols-outlined">flip</span>
        </button>
        <button class="tool-button" id="three-d-button" title="Toggle 3D perspective">
            <span class="material-symbols-outlined">view_in_ar</span>
        </button>
        <div class="fps-display" style="min-width: 50px; text-align: right;">
            <span id="fps-value">0</span> fps
        </div>
    </div>

    <div class="mobile-panel-tabs" aria-label="Mobile panel navigation">
        <button class="mobile-panel-tab is-active" data-panel-target="settings" type="button">Settings</button>
        <button class="mobile-panel-tab" data-panel-target="code" type="button">Code</button>
    </div>

    <div class="settings-panel" style="display: none;">
        <h3 class="settings-title">Settings</h3>
        <div class="settings-content"></div>
    </div>

    <div class="code-display" style="display: none;">
        <h3 class="code-title">
            Code
            <button class="copy-button" title="Copy code">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
        </h3>
        <pre class="code-content"><code class="language-html"></code></pre>
    </div>

    <div class="info-modal-overlay" aria-hidden="true">
        <div class="info-modal" role="dialog" aria-modal="true" aria-labelledby="info-modal-title">
            <button class="info-modal-close" type="button" aria-label="Close dialog">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h2 class="info-modal-title" id="info-modal-title"></h2>
            <div class="info-modal-body"></div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>

    <script src="components/knvas.js?v=13"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script>
        app.init();
    </script>
</body>
</html>
